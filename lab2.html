<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Advanced HTML</title>
</head>
<body>

    <header>
        <h1>22/EG/CO/1710</h1>
    </header>

    <!-- Navigation -->
    <nav>
        <a href="#">Home</a> |
        <a href="#">Profile</a> |
        <a href="#">Contact</a>
    </nav>

    <!-- Main Content -->
    <section>

        <article>
            <!-- Local Image -->
            <h2>Profile</h2>
            <img src="profile.jpg" alt="Profile Picture" width="150">
        </article>

        <!-- Table -->
        <article>
            <h2>Student Data</h2>
            <table border="1">
                <tr>
                    <th>Name</th>
                    <th>Age</th>
                    <th>Major</th>
                </tr>

                <tr>
                    <td>John Doe</td>
                    <td>21</td>
                    <td>Computer Science</td>
                </tr>

                <tr>
                    <td>Jane Smith</td>
                    <td>22</td>
                    <td>Software Engineering</td>
                </tr>

                <tr>
                    <td>Michael Lee</td>
                    <td>20</td>
                    <td>Information Systems</td>
                </tr>

                <tr>
                    <td>Sarah Johnson</td>
                    <td>23</td>
                    <td>Cybersecurity</td>
                </tr>
            </table>
        </article>

    </section>

    <!-- Form -->
    <section>
        <h2>Contact Form</h2>

        <form>
            <!-- Name -->
            <label for="name">Name:</label>
            <input type="text" id="name" name="name"><br><br>

            <!-- Gender (Radio Buttons) -->
            <p>Gender:</p>
            <input type="radio" id="male" name="gender" value="male">
            <label for="male">Male</label>

            <input type="radio" id="female" name="gender" value="female">
            <label for="female">Female</label><br><br>

            <!-- Checkbox -->
            <input type="checkbox" id="subscribe" name="subscribe">
            <label for="subscribe">Subscribe to newsletter</label><br><br>

            <!-- Textarea -->
            <label for="comments">Comments:</label><br>
            <textarea id="comments" name="comments" rows="4" cols="30"></textarea><br><br>

            <!-- Submit -->
            <input type="submit" value="Submit">
        </form>
    </section>

    <!-- Footer -->
    <footer>
        <p>&copy; 2026 My Web Page</p>
    </footer>

</body>
</html>
